<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="36%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F4943A"/>
      <stop offset="55%"  stop-color="#E07820"/>
      <stop offset="100%" stop-color="#B85A10"/>
    </radialGradient>
  </defs>

  <!-- Ball body -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15" stroke="#1a0900" stroke-width="0.75" fill="none"/>

  <!-- Horizontal seam -->
  <line x1="1" y1="16" x2="31" y2="16" stroke="#1a0900" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Vertical seam -->
  <line x1="16" y1="1" x2="16" y2="31" stroke="#1a0900" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Curved seams -->
  <path d="M16 1 C10 6 10 26 16 31" stroke="#1a0900" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M16 1 C22 6 22 26 16 31" stroke="#1a0900" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- Specular highlight -->
  <ellipse cx="11" cy="10" rx="4" ry="2.5" fill="white" opacity="0.12" transform="rotate(-30 11 10)"/>
</svg>
